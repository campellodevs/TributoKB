<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tributo Kobe Bryant</title>
</head>
<body>
    <header>
        <div class="text-area"> 
            <h1>Kobe Bryant</h1>
            <div class="subtext-area"><span>Em memória do melhor e mais dedicado jogador da história do basquete.</span></div>
        </div>
    </header>
    <main>
    <section id="section-image">
        <div class="imagem">
            <figure>
                <img src="assets/img/kobetribute.jpg" alt="Imagem de Kobe Bryant em 2012 após vencer o Utah Jazz">
                <figcaption>
                    Foto tirada em 2008 - após Kobe finalizar seu treino
                </figcaption>
            </figure>
        </div>
    </section>
   <section id="linhacronologica">
    <h2>Linha do tempo</h2>

    <ul class="timeline">
        <li data-info="Kobe Bryant começa a se destacar no basquete ainda no ensino médio.">1993</li>
        <li data-info="Draftado diretamente do ensino médio para a NBA pelo Charlotte Hornets.">1996</li>
        <li data-info="Primeiro título da NBA com o Los Angeles Lakers.">2000</li>
        <li data-info="Marca 81 pontos em um único jogo contra o Toronto Raptors.">2006</li>
        <li data-info="Conquista seu quinto título da NBA.">2010</li>
        <li data-info="Último jogo da carreira com 60 pontos.">2016</li>
    </ul>

    <p class="timeline-info">Passe o mouse sobre um ano</p>

        <div class="link">
        <a href="https://en.wikipedia.org/wiki/Kobe_Bryant" target="_blank">
            Referência bibliográfica
        </a>
    </div>
    </section>
    </main>

</footer>
</body>

</html>
